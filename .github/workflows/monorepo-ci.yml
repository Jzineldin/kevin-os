name: monorepo-ci

# Catches the chain-clobber regression class (parallel agent worktrees
# authored on stale bases that silently drop predecessor files when they
# merge). Runs typecheck + tests on every workspace except the dashboard
# (which dashboard-ci.yml already covers).
#
# If a stale-base merge ever drops a service handler again, this workflow
# fails on the offending PR before it lands on master.

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Typecheck all workspaces
        run: pnpm -r --workspace-concurrency=4 typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run packages + services tests
        run: |
          pnpm \
            --filter './packages/**' \
            --filter './services/**' \
            --workspace-concurrency=2 \
            test

  stub-detector:
    # Cheap heuristic: surfaces handlers reverted to "not yet implemented"
    # stubs that are NOT explicitly operator-deferred. The 3 known stubs
    # (publisher / baileys-fargate / verify-gate-5-baileys) are allow-listed.
    # Any new "not yet implemented" line on a handler.ts FAILS CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect unauthorized stub handlers
        run: |
          set -e
          ALLOWLIST="services/publisher/src/handler.ts
          services/baileys-fargate/src/entrypoint.ts
          services/verify-gate-5-baileys/src/handler.ts"
          OFFENDERS=$(grep -rl "not yet implemented" services/ --include="*.ts" || true)
          UNAUTHORIZED=""
          for f in $OFFENDERS; do
            if ! echo "$ALLOWLIST" | grep -qF "$f"; then
              UNAUTHORIZED="$UNAUTHORIZED$f\n"
            fi
          done
          if [ -n "$UNAUTHORIZED" ]; then
            echo "::error::Found stub handler(s) not on the operator-deferred allowlist:"
            printf "$UNAUTHORIZED"
            echo ""
            echo "If you genuinely intend to add a new operator-deferred stub,"
            echo "add the file path to the ALLOWLIST in .github/workflows/monorepo-ci.yml."
            exit 1
          fi
          echo "No unauthorized stubs detected."
